<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>9l7</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="9l7 - Social Media Links">

    <!-- Keywords -->
    <meta name="keywords" content="9l7, social media, links">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://9l7.online" />

    <!-- Author Information -->
    <meta name="author" content="9l7">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="LittleLink">

            <!-- Replace with your name or brand -->
            <h1>
              <div>9l7</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p dir="rtl">أهلاً وسهلاً! هذه المساحة مخصصة لجميع روابطي الرسمية ومنصات التواصل الاجتماعي الخاصة بي 👇</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- Instagram -->
              <a class="button button-instagram" href="https://www.instagram.com/9l7.u" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram</a>

              <!-- TikTok -->
              <a class="button button-tiktok" href="https://www.tiktok.com/@MS4wLjABAAAAd6rXDXZF6dUh_kp-Yns9hz_42s3cAmYqhY3g-t6d9RvRO_0XhnypAmqMlQIipsSp" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/tiktok.svg" alt="TikTok Logo">TikTok</a>

              <!-- YouTube Alt -->
              <a class="button button-yt-alt" href="https://www.youtube.com/@9l7.u" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube-alt.svg" alt="YouTube Logo">YouTube</a>

              <!-- Generic Shopping Bag -->
              <a class="button button-default" href="https://payhip.com/9l7" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Shopping Bag Icon">Payhip</a>

      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <span dir="rtl">من شرورة | الربع الخالي ❤️</span>
      </footer>

    </div>
  </div>

</body>

</html>
